<div [ngClass]="darkModeService.darkModeSignel()" @reveal>
  <div class="bg-[#f7f2f2] polka dark:bg-black pt-20">
    <!-- Header -->
    <app-header />
    <!-- Content -->
    <router-outlet></router-outlet>
    <!-- Footer -->
    <app-footer />
  </div>

  <!-- Back to top -->
  @if (showBackToTop) {
  <button (click)="scrollToTop()"
    class="fixed bottom-6 right-6 z-50 w-11 h-11 rounded-full bg-sky-500 text-white flex items-center justify-center shadow-lg hover:bg-sky-600 transition duration-300 back-to-top">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
    </svg>
  </button>
  }
</div>
